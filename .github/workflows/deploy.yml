name: Deploy

# Dormant until you set the repository VARIABLE `DEPLOY_ENABLED=true` and the
# secrets below. This prevents failed runs before the VPS is configured.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    # Best-effort: a deploy failure (e.g. VPS unreachable from GitHub Actions
    # IPs) must not fail the push — CI green is the gate; deploys retry on the
    # next push once the server is reachable.
    continue-on-error: true
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          # Prefer key auth. For password auth, delete `key:` and use
          #   password: ${{ secrets.VPS_PASSWORD }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/english-tutor
            git checkout -- uv.lock
            git pull --ff-only
            ~/.local/bin/uv sync --extra scrape
            systemctl restart english-tutor-bot
            systemctl --no-pager --lines=5 status english-tutor-bot
